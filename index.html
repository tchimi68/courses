    // ─── COMPOSANT PRINCIPAL ──────────────────────────────────────────────────
    function GroceryApp() {
      const [categories, setCategories] = useState(() => {
        try {
          const saved = localStorage.getItem("courses_categories");
          if (saved) {
            let cats = JSON.parse(saved);
            // Migration : scinder l'ancienne catégorie "legumes" en "fruits" + "legumes"
            if (cats.find(c => c.id === "legumes") && !cats.find(c => c.id === "fruits")) {
              const fruitIds = new Set([124,125,126,127,128,129,130,131,132,133,134]);
              const oignonIds = new Set([113,114,115,116]);
              const herbesIds = new Set([120,121,122,123]);
              const old = cats.find(c => c.id === "legumes");
              const fruitsItems  = old.items.filter(i => fruitIds.has(i.id));
              const base    = old.items.filter(i => !fruitIds.has(i.id) && !oignonIds.has(i.id) && !herbesIds.has(i.id));
              const oignons = old.items.filter(i => oignonIds.has(i.id));
              const herbes  = old.items.filter(i => herbesIds.has(i.id));
              const newFruits  = { id:"fruits",  label:"🍎 Fruits",   items: fruitsItems };
              const newLegumes = { ...old, label:"🥦 Légumes", items: [...base, ...oignons, ...herbes] };
              cats = cats.flatMap(c => c.id === "legumes" ? [newFruits, newLegumes] : [c]);
            }
            // Migration : insérer frais-pates-poisson après fromage-beurre si absent
            if (!cats.find(c => c.id === "frais-pates-poisson")) {
              const idx = cats.findIndex(c => c.id === "fromage-beurre");
              const newCat = { id: "frais-pates-poisson", label: "🥗 Frais / Pâtes — Houmous — Poisson fumé", items: [] };
              cats = idx !== -1
                ? [...cats.slice(0, idx+1), newCat, ...cats.slice(idx+1)]
                : [...cats, newCat];
            }
            // Migration : repositionner frais-pates-poisson juste après fromage-beurre si mal placé
            else {
              const fpIdx = cats.findIndex(c => c.id === "frais-pates-poisson");
              const fbIdx = cats.findIndex(c => c.id === "fromage-beurre");
              if (fbIdx !== -1 && fpIdx !== fbIdx + 1) {
                const cat = cats[fpIdx];
                cats = cats.filter((_, i) => i !== fpIdx);
                const newFbIdx = cats.findIndex(c => c.id === "fromage-beurre");
                cats = [...cats.slice(0, newFbIdx+1), cat, ...cats.slice(newFbIdx+1)];
              }
            }
            return cats;
          }
        } catch {}
        return initialCategories.map(cat => ({
          ...cat,
          items: cat.items.map(item => ({ ...item, checked: false })),
        }));
      });
      const [view, setView]                   = useState("list");
      const [newItemName, setNewItemName]     = useState("");
      const [newItemCat, setNewItemCat]       = useState("legumes");
      const [newItemStore, setNewItemStore]   = useState("super");
      const [showFrequentOnly, setShowFrequentOnly] = useState(false);
      const [filterStore, setFilterStore]     = useState("all");
      const [nextId, setNextId]               = useState(500);
      const [expandedCats, setExpandedCats]   = useState(() =>
        Object.fromEntries(initialCategories.map(c => [c.id, true]))
      );
      const [editingStore, setEditingStore]   = useState(null);
      const [customCartItems, setCustomCartItems] = useState(() => {
        try {
          const saved = localStorage.getItem("courses_custom_cart");
          if (saved) return JSON.parse(saved);
        } catch {}
        return [];
      });
      const [customName, setCustomName]       = useState("");
      const [customStore, setCustomStore]     = useState("super");
      const customInputRef = useRef(null);
      const [editingName, setEditingName]     = useState(null); // { catId, itemId }
      const [editNameValue, setEditNameValue] = useState("");
      const [search, setSearch]               = useState("");
      const searchInputRef                    = useRef(null);

      // ── HISTORIQUE (undo) ─────────────────────────────────────────────────
      const historyRef     = useRef([]);
      const categoriesRef  = useRef(categories);
      const [canUndo, setCanUndo] = useState(false);
      useEffect(() => { categoriesRef.current = categories; }, [categories]);

      const updateCategories = (updaterOrValue) => {
        historyRef.current = [...historyRef.current.slice(-29), categoriesRef.current];
        setCanUndo(true);
        setCategories(updaterOrValue);
      };

      const undo = () => {
        if (!historyRef.current.length) return;
        const prev = historyRef.current[historyRef.current.length - 1];
        historyRef.current = historyRef.current.slice(0, -1);
        setCanUndo(historyRef.current.length > 0);
        setCategories(prev);
      };

      // ── DRAG & DROP ────────────────────────────────────────────────────────
      const dragRef      = useRef(null);  // { catId, itemId }
      const dropRef      = useRef(null);  // { catId, beforeItemId }
      const ghostDivRef  = useRef(null);
      const [dragging,   setDragging]   = useState(null);  // { catId, itemId, name }
      const [dropTarget, setDropTarget] = useState(null);  // { catId, beforeItemId }
      const [ghostPos,   setGhostPos]   = useState(null);  // { x, y }

      const startDrag = (e, catId, itemId, name) => {
        e.preventDefault();
        e.stopPropagation();
        dragRef.current = { catId, itemId };
        setDragging({ catId, itemId, name });
        setGhostPos({ x: e.clientX, y: e.clientY });
      };

      useEffect(() => {
        const onMove = (e) => {
          if (!dragRef.current) return;
          setGhostPos({ x: e.clientX, y: e.clientY });
          if (ghostDivRef.current) ghostDivRef.current.style.visibility = "hidden";
          const el = document.elementFromPoint(e.clientX, e.clientY);
          if (ghostDivRef.current) ghostDivRef.current.style.visibility = "";
          const itemEl = el?.closest("[data-item-id]");
          if (itemEl) {
            const tgt = { catId: itemEl.dataset.catId, beforeItemId: Number(itemEl.dataset.itemId) };
            if (tgt.catId !== dropRef.current?.catId || tgt.beforeItemId !== dropRef.current?.beforeItemId) {
              dropRef.current = tgt;
              setDropTarget({ ...tgt });
            }
            return;
          }
          const catEl = el?.closest("[data-cat-id]");
          if (catEl) {
            const tgt = { catId: catEl.dataset.catId, beforeItemId: null };
            if (tgt.catId !== dropRef.current?.catId || dropRef.current?.beforeItemId !== null) {
              dropRef.current = tgt;
              setDropTarget({ ...tgt });
            }
            return;
          }
          if (dropRef.current) { dropRef.current = null; setDropTarget(null); }
        };

        const onUp = () => {
          if (!dragRef.current) return;
          const src = dragRef.current;
          const tgt = dropRef.current;
          if (tgt && !(tgt.catId === src.catId && tgt.beforeItemId === src.itemId)) {
            updateCategories(cats => {
              const item = cats.find(c => c.id === src.catId)?.items.find(i => i.id === src.itemId);
              if (!item) return cats;
              let next = cats.map(cat =>
                cat.id === src.catId ? { ...cat, items: cat.items.filter(i => i.id !== src.itemId) } : cat
              );
              next = next.map(cat => {
                if (cat.id !== tgt.catId) return cat;
                if (!tgt.beforeItemId) return { ...cat, items: [...cat.items, item] };
                const idx = cat.items.findIndex(i => i.id === tgt.beforeItemId);
                if (idx === -1) return { ...cat, items: [...cat.items, item] };
                const items = [...cat.items];
                items.splice(idx, 0, item);
                return { ...cat, items };
              });
              return next;
            });
          }
          dragRef.current = null;
          dropRef.current = null;
          setDragging(null);
          setDropTarget(null);
          setGhostPos(null);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        return () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
      }, []);

      // ── PERSISTANCE ───────────────────────────────────────────────────────
      useEffect(() => {
        localStorage.setItem("courses_categories", JSON.stringify(categories));
      }, [categories]);

      useEffect(() => {
        localStorage.setItem("courses_custom_cart", JSON.stringify(customCartItems));
      }, [customCartItems]);

      // ── HANDLERS ──────────────────────────────────────────────────────────
      const toggleItem = (catId, itemId) =>
        updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, checked: !i.checked } : i) }
            : cat
        ));

      const setItemStore = (catId, itemId, store) => {
        updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, store } : i) }
            : cat
        ));
        setEditingStore(null);
      };

      const toggleFrequent = (catId, itemId) =>
        updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, frequent: !i.frequent } : i) }
            : cat
        ));

      const deleteItem = (catId, itemId) =>
        updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.filter(i => i.id !== itemId) }
            : cat
        ));

      const addItem = () => {
        if (!newItemName.trim()) return;
        updateCategories(cats => cats.map(cat =>
          cat.id === newItemCat
            ? { ...cat, items: [...cat.items, { id: nextId, name: newItemName.trim(), checked: true, frequent: false, store: newItemStore }] }
            : cat
        ));
        setNextId(n => n + 1);
        setNewItemName("");
      };

      const addCustomCartItem = () => {
        if (!customName.trim()) return;
        setCustomCartItems(items => [...items, { id: `c_${Date.now()}`, name: customName.trim(), store: customStore }]);
        setCustomName("");
        customInputRef.current?.focus();
      };

      const removeCustomCartItem = (id) =>
        setCustomCartItems(items => items.filter(i => i.id !== id));

      const startEditName = (catId, itemId, name) => {
        setEditingName({ catId, itemId });
        setEditNameValue(name);
      };

      const confirmEditName = () => {
        if (!editingName) return;
        const { catId, itemId } = editingName;
        const trimmed = editNameValue.trim();
        if (trimmed) updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, name: trimmed } : i) }
            : cat
        ));
        setEditingName(null);
      };

      const setItemQty = (catId, itemId, qty) =>
        updateCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, qty: Math.max(1, qty) } : i) }
            : cat
        ));

      const setCustomQty = (id, qty) =>
        setCustomCartItems(items => items.map(i => i.id === id ? { ...i, qty: Math.max(1, qty) } : i));

      const clearCart = () => {
        updateCategories(cats => cats.map(cat => ({ ...cat, items: cat.items.map(i => ({ ...i, checked: false })) })));
        setCustomCartItems([]);
      };

      const toggleCat = (catId) =>
        setExpandedCats(e => ({ ...e, [catId]: !e[catId] }));

      const allChecked = [
        ...categories.flatMap(cat =>
          cat.items.filter(i => i.checked).map(i => ({ ...i, catLabel: cat.label, catId: cat.id }))
        ),
        ...customCartItems.map(i => ({ ...i, catLabel: null, catId: null })),
      ];
      const totalChecked = allChecked.length;

      const cartByStore = STORES.map(s => ({
        ...s,
        items: allChecked.filter(i => i.store === s.id),
      })).filter(s => s.items.length > 0);

      // ── RENDER ──────────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight:"100vh", background:"#ffffff", color:"#1a1a1a", fontFamily:"Georgia,serif", maxWidth:480, margin:"0 auto", paddingBottom:120 }}>

          {/* Ghost drag */}
          {ghostPos && (
            <div ref={ghostDivRef} style={{
              position:"fixed", left:ghostPos.x + 14, top:ghostPos.y - 14,
              background:"#ffffff", border:"2px solid #c8a96e", borderRadius:8,
              padding:"6px 14px", fontSize:15, color:"#1a1a1a",
              pointerEvents:"none", zIndex:9999,
              boxShadow:"0 4px 16px rgba(0,0,0,0.15)", whiteSpace:"nowrap",
            }}>{dragging?.name}</div>
          )}

          {/* ── HEADER ── */}
          <div style={{ padding:"24px 20px 14px", borderBottom:"1px solid #e5e5e5", position:"sticky", top:0, background:"#ffffff", zIndex:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:11, letterSpacing:3, color:"#999", textTransform:"uppercase", marginBottom:3 }}>Liste de courses</div>
                <h1 style={{ margin:0, fontSize:22, fontWeight:"normal" }}>
                  {view === "cart" ? `🛒 Panier (${totalChecked})` : "Tous les rayons"}
                </h1>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                {canUndo && (
                  <button onClick={undo} style={{
                    background:"transparent", border:"1px solid #e53935",
                    color:"#e53935", borderRadius:20, padding:"5px 10px", fontSize:13, cursor:"pointer",
                  }}>↩ Annuler</button>
                )}
                {view === "list" && (
                  <button onClick={() => setShowFrequentOnly(f => !f)} style={{
                    background: showFrequentOnly ? "#c8a96e" : "transparent",
                    border: `1px solid ${showFrequentOnly ? "#c8a96e" : "#ccc"}`,
                    color: showFrequentOnly ? "#ffffff" : "#999",
                    borderRadius:20, padding:"5px 10px", fontSize:13, cursor:"pointer",
                  }}>★ fréquents</button>
                )}
                <button onClick={() => setView(v => v === "list" ? "cart" : "list")} style={{
                  background: view === "cart" ? "#c8a96e" : "#f5f5f5",
                  border: `1px solid ${view === "cart" ? "#c8a96e" : "#e0e0e0"}`,
                  color: view === "cart" ? "#ffffff" : "#1a1a1a",
                  borderRadius:20, padding:"6px 14px", fontSize:14, cursor:"pointer", fontFamily:"Georgia,serif",
                }}>
                  {view === "list" ? `🛒 ${totalChecked}` : "← Liste"}
                </button>
              </div>
            </div>

            {/* Recherche */}
            {view === "list" && (
              <div style={{ marginTop:12, position:"relative" }}>
                <input
                  ref={searchInputRef}
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Rechercher un article..."
                  style={{ width:"100%", background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:8, padding:"9px 36px 9px 14px", color:"#1a1a1a", fontFamily:"Georgia,serif", fontSize:15, outline:"none" }}
                />
                {search && (
                  <button onClick={() => { setSearch(""); searchInputRef.current?.focus(); }} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#aaa", cursor:"pointer", fontSize:16, lineHeight:1 }}>✕</button>
                )}
              </div>
            )}

            {/* Filtres magasins */}
            {view === "list" && !search && (
              <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
                <button onClick={() => setFilterStore("all")} style={{
                  background: filterStore === "all" ? "#1a1a1a" : "transparent",
                  border: `1px solid ${filterStore === "all" ? "#1a1a1a" : "#ccc"}`,
                  color: filterStore === "all" ? "#ffffff" : "#888",
                  borderRadius:20, padding:"4px 12px", fontSize:13, cursor:"pointer",
                }}>Tous</button>
                {STORES.map(s => (
                  <button key={s.id} onClick={() => setFilterStore(filterStore === s.id ? "all" : s.id)} style={{
                    background: filterStore === s.id ? s.color : "transparent",
                    border: `1px solid ${filterStore === s.id ? s.color : "#ccc"}`,
                    color: filterStore === s.id ? "#ffffff" : "#888",
                    borderRadius:20, padding:"4px 12px", fontSize:13, cursor:"pointer",
                  }}>{s.label}</button>
                ))}
              </div>
            )}
          </div>

          {/* ── VUE PANIER ── */}
          {view === "cart" && (
            <div style={{ padding:"16px 20px" }}>
              {cartByStore.length === 0 ? (
                <div style={{ textAlign:"center", color:"#aaa", marginTop:60 }}>Aucun article sélectionné.</div>
              ) : (
                <>
                  {cartByStore.map(store => (
                    <div key={store.id} style={{ marginBottom:32 }}>
                      <div style={{ fontSize:15, color:store.color, marginBottom:12, borderBottom:`2px solid ${store.color}`, paddingBottom:8, display:"flex", justifyContent:"space-between" }}>
                        <span>{store.label}</span>
                        <span style={{ color:"#aaa", fontSize:13 }}>{store.items.length} article{store.items.length > 1 ? "s" : ""}</span>
                      </div>
                      {store.items.map(item => (
                        <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #eeeeee", gap:12 }}>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:17 }}>{item.name}</div>
                            {item.catLabel && <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>{item.catLabel}</div>}
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                            <button onClick={() => item.catId ? setItemQty(item.catId, item.id, (item.qty||1)-1) : setCustomQty(item.id, (item.qty||1)-1)}
                              style={{ width:28, height:28, background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:6, cursor:"pointer", fontSize:18, lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                            <span style={{ fontSize:16, minWidth:22, textAlign:"center", fontFamily:"Georgia,serif" }}>{item.qty || 1}</span>
                            <button onClick={() => item.catId ? setItemQty(item.catId, item.id, (item.qty||1)+1) : setCustomQty(item.id, (item.qty||1)+1)}
                              style={{ width:28, height:28, background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:6, cursor:"pointer", fontSize:18, lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                            <button onClick={() => item.catId ? toggleItem(item.catId, item.id) : removeCustomCartItem(item.id)} style={{ background:"none", border:"none", color:"#e53935", cursor:"pointer", fontSize:18, padding:"4px 6px" }}>✕</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                  <button onClick={clearCart} style={{ width:"100%", marginTop:8, padding:"14px", background:"transparent", border:"1px solid #e0e0e0", color:"#aaa", borderRadius:8, cursor:"pointer", fontFamily:"Georgia,serif", fontSize:15 }}>
                    Vider le panier
                  </button>
                </>
              )}

              {/* Ajout libre dans le panier */}
              <div style={{ marginTop:32, borderTop:"1px solid #e5e5e5", paddingTop:20 }}>
                <div style={{ fontSize:11, letterSpacing:2, color:"#aaa", textTransform:"uppercase", marginBottom:10 }}>Ajouter un article</div>
                <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                  <input
                    ref={customInputRef}
                    value={customName}
                    onChange={e => setCustomName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addCustomCartItem()}
                    placeholder="Ex : Tabasco, Chips..."
                    style={{ flex:1, background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:8, padding:"10px 12px", color:"#1a1a1a", fontFamily:"Georgia,serif", fontSize:16, outline:"none" }}
                  />
                  <button onClick={addCustomCartItem} style={{ background:"#c8a96e", border:"none", borderRadius:8, padding:"10px 16px", color:"#ffffff", cursor:"pointer", fontSize:20, fontWeight:"bold" }}>+</button>
                </div>
                <div style={{ display:"flex", gap:6 }}>
                  {STORES.map(s => (
                    <button key={s.id} onClick={() => setCustomStore(s.id)} style={{
                      background: customStore === s.id ? s.color : "transparent",
                      border: `1px solid ${customStore === s.id ? s.color : "#ccc"}`,
                      color: customStore === s.id ? "#ffffff" : s.color,
                      borderRadius:20, padding:"4px 8px", fontSize:12, cursor:"pointer", flex:1,
                    }}>{s.label}</button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── VUE LISTE — RÉSULTATS RECHERCHE ── */}
          {view === "list" && search && (
            <div style={{ padding:"6px 0" }}>
              {(() => {
                const q = search.toLowerCase();
                const results = categories.flatMap(cat =>
                  cat.items
                    .filter(i => i.name.toLowerCase().includes(q))
                    .map(i => ({ ...i, catLabel: cat.label, catId: cat.id }))
                );
                if (results.length === 0) return (
                  <div style={{ textAlign:"center", color:"#aaa", marginTop:60, fontSize:15 }}>Aucun résultat pour « {search} »</div>
                );
                return results.map(item => {
                  const store = storeInfo(item.store);
                  const isEditingThis = editingName?.itemId === item.id && editingName?.catId === item.catId;
                  return (
                    <div key={item.id}>
                      <div style={{ display:"flex", alignItems:"center", padding:"9px 20px", borderBottom:"1px solid #eeeeee", background: item.checked ? "#f0f7ee" : "#ffffff" }}>
                        <div style={{ width:20, height:20, borderRadius:4, border: item.checked ? "none" : "1px solid #ccc", background: item.checked ? "#5a8e4a" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", flexShrink:0, marginRight:12, fontSize:12, color:"#ffffff" }}
                          onClick={() => toggleItem(item.catId, item.id)}>{item.checked && "✓"}</div>
                        <div style={{ flex:1 }}>
                          {isEditingThis ? (
                            <input autoFocus value={editNameValue} onChange={e => setEditNameValue(e.target.value)}
                              onBlur={confirmEditName} onKeyDown={e => { if (e.key==="Enter") confirmEditName(); if (e.key==="Escape") setEditingName(null); }}
                              style={{ fontSize:16, border:"none", borderBottom:"2px solid #c8a96e", outline:"none", fontFamily:"Georgia,serif", background:"transparent", color:"#1a1a1a", width:"100%" }} />
                          ) : (
                            <span onClick={() => startEditName(item.catId, item.id, item.name)} style={{ fontSize:16, cursor:"text", textDecoration: item.checked ? "line-through" : "none", color: item.checked ? "#bbb" : "#1a1a1a" }}>{item.name}</span>
                          )}
                          <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>{item.catLabel}</div>
                        </div>
                        <button onClick={() => setEditingStore(editingStore===item.id ? null : item.id)} style={{ background:"transparent", border:`1px solid ${store.color}`, borderRadius:12, padding:"2px 8px", fontSize:12, color:store.color, cursor:"pointer", marginRight:6, whiteSpace:"nowrap" }}>{store.label.split(" ")[0]}</button>
                        <button onClick={() => toggleFrequent(item.catId, item.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, color: item.frequent ? "#c8a96e" : "#ddd", padding:3 }}>★</button>
                        <button onClick={() => deleteItem(item.catId, item.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#e53935", padding:3 }}>✕</button>
                      </div>
                      {editingStore === item.id && (
                        <div style={{ display:"flex", gap:6, padding:"8px 20px 8px 54px", background:"#f8f8f8", borderBottom:"1px solid #eeeeee", flexWrap:"wrap" }}>
                          {STORES.map(s => (
                            <button key={s.id} onClick={() => setItemStore(item.catId, item.id, s.id)} style={{ background: item.store===s.id ? s.color : "transparent", border:`1px solid ${item.store===s.id ? s.color : "#ccc"}`, color: item.store===s.id ? "#ffffff" : s.color, borderRadius:20, padding:"4px 10px", fontSize:13, cursor:"pointer" }}>{s.label}</button>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          )}

          {/* ── VUE LISTE ── */}
          {view === "list" && !search && (
            <div style={{ padding:"6px 0" }}>
              {categories.map(cat => {
                let visibleItems = cat.items;
                if (showFrequentOnly) visibleItems = visibleItems.filter(i => i.frequent);
                if (filterStore !== "all") visibleItems = visibleItems.filter(i => i.store === filterStore);
                if (cat.items.length > 0 && visibleItems.length === 0) return null;
                const checkedCount = visibleItems.filter(i => i.checked).length;
                const isExpanded = expandedCats[cat.id];
                const isDropTarget = dropTarget?.catId === cat.id && !dropTarget?.beforeItemId;

                return (
                  <div key={cat.id} data-cat-id={cat.id} style={{ marginBottom:1 }}>
                    {/* Entête catégorie */}
                    <div onClick={() => toggleCat(cat.id)} style={{
                      padding:"12px 20px", display:"flex", justifyContent:"space-between", alignItems:"center",
                      cursor:"pointer", borderBottom:"1px solid #e5e5e5",
                      background: isDropTarget ? "#fff8e8" : checkedCount > 0 ? "#f0f7ee" : "#f8f8f8",
                      borderLeft: isDropTarget ? "3px solid #c8a96e" : "3px solid transparent",
                    }}>
                      <span style={{ fontSize:13, letterSpacing:2, color:"#c8a96e", textTransform:"uppercase" }}>{cat.label}</span>
                      <span style={{ fontSize:13, color:"#aaa" }}>
                        {checkedCount > 0 && <span style={{ color:"#5a8e4a", marginRight:8 }}>✓{checkedCount}</span>}
                        {isExpanded ? "▲" : "▼"}
                      </span>
                    </div>

                    {isExpanded && visibleItems.map(item => {
                      const store = storeInfo(item.store);
                      const isEditingThis = editingStore === item.id;
                      const isBeforeTarget = dropTarget?.catId === cat.id && dropTarget?.beforeItemId === item.id;
                      const isDraggingThis = dragging?.itemId === item.id && dragging?.catId === cat.id;
                      return (
                        <div key={item.id}>
                          <div
                            data-item-id={item.id}
                            data-cat-id={cat.id}
                            style={{
                              display:"flex", alignItems:"center", padding:"9px 20px",
                              borderBottom:"1px solid #eeeeee",
                              borderTop: isBeforeTarget ? "2px solid #c8a96e" : "1px solid transparent",
                              background: item.checked ? "#f0f7ee" : "#ffffff",
                              opacity: isDraggingThis ? 0.3 : 1,
                            }}
                          >
                            {/* Poignée de déplacement */}
                            <div
                              onPointerDown={e => startDrag(e, cat.id, item.id, item.name)}
                              style={{ touchAction:"none", cursor:"grab", color:"#ccc", fontSize:16, marginRight:10, flexShrink:0, userSelect:"none", padding:"2px 4px" }}
                            >⠿</div>

                            {/* Checkbox */}
                            <div onClick={() => toggleItem(cat.id, item.id)} style={{
                              width:20, height:20, borderRadius:4,
                              border: item.checked ? "none" : "1px solid #ccc",
                              background: item.checked ? "#5a8e4a" : "transparent",
                              display:"flex", alignItems:"center", justifyContent:"center",
                              cursor:"pointer", flexShrink:0, marginRight:12, fontSize:12, color:"#ffffff",
                            }}>{item.checked && "✓"}</div>

                            {/* Nom — clic = édition */}
                            {editingName?.itemId === item.id && editingName?.catId === cat.id ? (
                              <input
                                autoFocus
                                value={editNameValue}
                                onChange={e => setEditNameValue(e.target.value)}
                                onBlur={confirmEditName}
                                onKeyDown={e => { if (e.key === "Enter") confirmEditName(); if (e.key === "Escape") setEditingName(null); }}
                                style={{ flex:1, fontSize:16, border:"none", borderBottom:"2px solid #c8a96e", outline:"none", fontFamily:"Georgia,serif", background:"transparent", color:"#1a1a1a", padding:"0 2px" }}
                              />
                            ) : (
                              <span onClick={() => startEditName(cat.id, item.id, item.name)} style={{
                                flex:1, fontSize:16, cursor:"text",
                                textDecoration: item.checked ? "line-through" : "none",
                                color: item.checked ? "#bbb" : "#1a1a1a",
                              }}>{item.name}</span>
                            )}

                            {/* Badge magasin */}
                            <button onClick={() => setEditingStore(isEditingThis ? null : item.id)} style={{
                              background:"transparent", border:`1px solid ${store.color}`, borderRadius:12,
                              padding:"2px 8px", fontSize:12, color:store.color,
                              cursor:"pointer", marginRight:6, whiteSpace:"nowrap",
                            }}>{store.label.split(" ")[0]}</button>

                            {/* Étoile */}
                            <button onClick={() => toggleFrequent(cat.id, item.id)} style={{
                              background:"none", border:"none", cursor:"pointer",
                              fontSize:14, color: item.frequent ? "#c8a96e" : "#ddd", padding:3,
                            }}>★</button>

                            {/* Supprimer */}
                            <button onClick={() => deleteItem(cat.id, item.id)} style={{
                              background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#e53935", padding:3,
                            }}>✕</button>
                          </div>

                          {/* Sélecteur magasin */}
                          {isEditingThis && (
                            <div style={{ display:"flex", gap:6, padding:"8px 20px 8px 54px", background:"#f8f8f8", borderBottom:"1px solid #eeeeee", flexWrap:"wrap" }}>
                              {STORES.map(s => (
                                <button key={s.id} onClick={() => setItemStore(cat.id, item.id, s.id)} style={{
                                  background: item.store === s.id ? s.color : "transparent",
                                  border: `1px solid ${item.store === s.id ? s.color : "#ccc"}`,
                                  color: item.store === s.id ? "#ffffff" : s.color,
                                  borderRadius:20, padding:"4px 10px", fontSize:13, cursor:"pointer",
                                }}>{s.label}</button>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              {/* Ajouter un article */}
              <div style={{ padding:"20px", borderTop:"1px solid #e5e5e5", marginTop:16 }}>
                <div style={{ fontSize:11, letterSpacing:2, color:"#aaa", textTransform:"uppercase", marginBottom:10 }}>Ajouter un article</div>
                <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                  <input
                    value={newItemName}
                    onChange={e => setNewItemName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addItem()}
                    placeholder="Nom de l'article..."
                    style={{ flex:1, background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:8, padding:"10px 12px", color:"#1a1a1a", fontFamily:"Georgia,serif", fontSize:16, outline:"none" }}
                  />
                  <button onClick={addItem} style={{ background:"#c8a96e", border:"none", borderRadius:8, padding:"10px 16px", color:"#ffffff", cursor:"pointer", fontSize:20, fontWeight:"bold" }}>+</button>
                </div>
                <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
                  {STORES.map(s => (
                    <button key={s.id} onClick={() => setNewItemStore(s.id)} style={{
                      background: newItemStore === s.id ? s.color : "transparent",
                      border: `1px solid ${newItemStore === s.id ? s.color : "#ccc"}`,
                      color: newItemStore === s.id ? "#ffffff" : s.color,
                      borderRadius:20, padding:"4px 10px", fontSize:13, cursor:"pointer",
                    }}>{s.label}</button>
                  ))}
                </div>
                <select value={newItemCat} onChange={e => setNewItemCat(e.target.value)} style={{
                  width:"100%", background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:8,
                  padding:"10px 12px", color:"#666", fontFamily:"Georgia,serif", fontSize:15, outline:"none",
                }}>
                  {categories.map(cat => <option key={cat.id} value={cat.id}>{cat.label}</option>)}
                </select>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MOUNT ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GroceryApp />);
  </script>
</body>
</html>
