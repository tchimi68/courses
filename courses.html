    function GroceryApp() {
      const [categories, setCategories] = useState(
        initialCategories.map(cat => ({
          ...cat,
          items: cat.items.map(item => ({ ...item, checked: false })),
        }))
      );
      const [view, setView]                   = useState("list");
      const [newItemName, setNewItemName]     = useState("");
      const [newItemCat, setNewItemCat]       = useState("legumes");
      const [newItemStore, setNewItemStore]   = useState("super");
      const [showFrequentOnly, setShowFrequentOnly] = useState(false);
      const [filterStore, setFilterStore]     = useState("all");
      const [nextId, setNextId]               = useState(500);
      const [expandedCats, setExpandedCats]   = useState(() =>
        Object.fromEntries(initialCategories.map(c => [c.id, true]))
      );
      const [editingStore, setEditingStore]   = useState(null);

      const toggleItem = (catId, itemId) =>
        setCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, checked: !i.checked } : i) }
            : cat
        ));

      const setItemStore = (catId, itemId, store) => {
        setCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, store } : i) }
            : cat
        ));
        setEditingStore(null);
      };

      const toggleFrequent = (catId, itemId) =>
        setCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.map(i => i.id === itemId ? { ...i, frequent: !i.frequent } : i) }
            : cat
        ));

      const deleteItem = (catId, itemId) =>
        setCategories(cats => cats.map(cat =>
          cat.id === catId
            ? { ...cat, items: cat.items.filter(i => i.id !== itemId) }
            : cat
        ));

      const addItem = () => {
        if (!newItemName.trim()) return;
        setCategories(cats => cats.map(cat =>
          cat.id === newItemCat
            ? { ...cat, items: [...cat.items, { id: nextId, name: newItemName.trim(), checked: true, frequent: false, store: newItemStore }] }
            : cat
        ));
        setNextId(n => n + 1);
        setNewItemName("");
      };

      const clearCart = () =>
        setCategories(cats => cats.map(cat => ({ ...cat, items: cat.items.map(i => ({ ...i, checked: false })) })));

      const toggleCat = (catId) =>
        setExpandedCats(e => ({ ...e, [catId]: !e[catId] }));

      const allChecked = categories.flatMap(cat =>
        cat.items.filter(i => i.checked).map(i => ({ ...i, catLabel: cat.label, catId: cat.id }))
      );
      const totalChecked = allChecked.length;

      const cartByStore = STORES.map(s => ({
        ...s,
        items: allChecked.filter(i => i.store === s.id),
      })).filter(s => s.items.length > 0);

      // ── RENDER ──────────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight:"100vh", background:"#0f0f0f", color:"#f0ede8", fontFamily:"Georgia,serif", maxWidth:480, margin:"0 auto", paddingBottom:120 }}>

          {/* ── HEADER ── */}
          <div style={{ padding:"24px 20px 14px", borderBottom:"1px solid #222", position:"sticky", top:0, background:"#0f0f0f", zIndex:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:10, letterSpacing:3, color:"#555", textTransform:"uppercase", marginBottom:3 }}>Liste de courses</div>
                <h1 style={{ margin:0, fontSize:20, fontWeight:"normal" }}>
                  {view === "cart" ? `🛒 Panier (${totalChecked})` : "Tous les rayons"}
                </h1>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                {view === "list" && (
                  <button onClick={() => setShowFrequentOnly(f => !f)} style={{
                    background: showFrequentOnly ? "#c8a96e" : "transparent",
                    border: `1px solid ${showFrequentOnly ? "#c8a96e" : "#444"}`,
                    color: showFrequentOnly ? "#0f0f0f" : "#888",
                    borderRadius:20, padding:"5px 10px", fontSize:11, cursor:"pointer",
                  }}>★ fréquents</button>
                )}
                <button onClick={() => setView(v => v === "list" ? "cart" : "list")} style={{
                  background: view === "cart" ? "#c8a96e" : "#1a1a1a",
                  border: `1px solid ${view === "cart" ? "#c8a96e" : "#333"}`,
                  color: view === "cart" ? "#0f0f0f" : "#f0ede8",
                  borderRadius:20, padding:"6px 14px", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif",
                }}>
                  {view === "list" ? `🛒 ${totalChecked}` : "← Liste"}
                </button>
              </div>
            </div>

            {/* Filtres magasins */}
            {view === "list" && (
              <div style={{ display:"flex", gap:6, marginTop:12, flexWrap:"wrap" }}>
                <button onClick={() => setFilterStore("all")} style={{
                  background: filterStore === "all" ? "#f0ede8" : "transparent",
                  border: `1px solid ${filterStore === "all" ? "#f0ede8" : "#333"}`,
                  color: filterStore === "all" ? "#0f0f0f" : "#666",
                  borderRadius:20, padding:"4px 12px", fontSize:11, cursor:"pointer",
                }}>Tous</button>
                {STORES.map(s => (
                  <button key={s.id} onClick={() => setFilterStore(filterStore === s.id ? "all" : s.id)} style={{
                    background: filterStore === s.id ? s.color : "transparent",
                    border: `1px solid ${filterStore === s.id ? s.color : "#333"}`,
                    color: filterStore === s.id ? "#0f0f0f" : "#666",
                    borderRadius:20, padding:"4px 12px", fontSize:11, cursor:"pointer",
                  }}>{s.label}</button>
                ))}
              </div>
            )}
          </div>

          {/* ── VUE PANIER ── */}
          {view === "cart" && (
            <div style={{ padding:"16px 20px" }}>
              {cartByStore.length === 0 ? (
                <div style={{ textAlign:"center", color:"#555", marginTop:60 }}>Aucun article sélectionné.</div>
              ) : (
                <>
                  {cartByStore.map(store => (
                    <div key={store.id} style={{ marginBottom:32 }}>
                      <div style={{ fontSize:13, color:store.color, marginBottom:12, borderBottom:"1px solid #222", paddingBottom:8, display:"flex", justifyContent:"space-between" }}>
                        <span>{store.label}</span>
                        <span style={{ color:"#555", fontSize:11 }}>{store.items.length} article{store.items.length > 1 ? "s" : ""}</span>
                      </div>
                      {store.items.map(item => (
                        <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 0", borderBottom:"1px solid #1a1a1a" }}>
                          <div>
                            <div style={{ fontSize:15 }}>{item.name}</div>
                            <div style={{ fontSize:10, color:"#444", marginTop:2 }}>{item.catLabel}</div>
                          </div>
                          <button onClick={() => toggleItem(item.catId, item.id)} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16, padding:"4px 8px" }}>✕</button>
                        </div>
                      ))}
                    </div>
                  ))}
                  <button onClick={clearCart} style={{ width:"100%", marginTop:8, padding:"14px", background:"transparent", border:"1px solid #282828", color:"#555", borderRadius:8, cursor:"pointer", fontFamily:"Georgia,serif", fontSize:13 }}>
                    Vider le panier
                  </button>
                </>
              )}
            </div>
          )}

          {/* ── VUE LISTE ── */}
          {view === "list" && (
            <div style={{ padding:"6px 0" }}>
              {categories.map(cat => {
                let visibleItems = cat.items;
                if (showFrequentOnly) visibleItems = visibleItems.filter(i => i.frequent);
                if (filterStore !== "all") visibleItems = visibleItems.filter(i => i.store === filterStore);
                if (visibleItems.length === 0) return null;
                const checkedCount = visibleItems.filter(i => i.checked).length;
                const isExpanded = expandedCats[cat.id];

                return (
                  <div key={cat.id} style={{ marginBottom:1 }}>
                    {/* Entête catégorie */}
                    <div onClick={() => toggleCat(cat.id)} style={{
                      padding:"11px 20px", display:"flex", justifyContent:"space-between", alignItems:"center",
                      cursor:"pointer", borderBottom:"1px solid #1a1a1a",
                      background: checkedCount > 0 ? "#111a10" : "#0a0a0a",
                    }}>
                      <span style={{ fontSize:11, letterSpacing:2, color:"#c8a96e", textTransform:"uppercase" }}>{cat.label}</span>
                      <span style={{ fontSize:11, color:"#555" }}>
                        {checkedCount > 0 && <span style={{ color:"#6a9e5a", marginRight:8 }}>✓{checkedCount}</span>}
                        {isExpanded ? "▲" : "▼"}
                      </span>
                    </div>

                    {isExpanded && visibleItems.map(item => {
                      const store = storeInfo(item.store);
                      const isEditingThis = editingStore === item.id;
                      return (
                        <div key={item.id}>
                          <div style={{ display:"flex", alignItems:"center", padding:"8px 20px", borderBottom:"1px solid #111", background: item.checked ? "#0d160c" : "transparent" }}>
                            {/* Checkbox */}
                            <div onClick={() => toggleItem(cat.id, item.id)} style={{
                              width:19, height:19, borderRadius:4,
                              border: item.checked ? "none" : "1px solid #333",
                              background: item.checked ? "#6a9e5a" : "transparent",
                              display:"flex", alignItems:"center", justifyContent:"center",
                              cursor:"pointer", flexShrink:0, marginRight:11, fontSize:11,
                            }}>{item.checked && "✓"}</div>

                            {/* Nom */}
                            <span onClick={() => toggleItem(cat.id, item.id)} style={{
                              flex:1, fontSize:14, cursor:"pointer",
                              textDecoration: item.checked ? "line-through" : "none",
                              color: item.checked ? "#3a3a3a" : "#f0ede8",
                            }}>{item.name}</span>

                            {/* Badge magasin */}
                            <button onClick={() => setEditingStore(isEditingThis ? null : item.id)} style={{
                              background:"transparent", border:"1px solid #222", borderRadius:12,
                              padding:"2px 8px", fontSize:10, color:store.color,
                              cursor:"pointer", marginRight:6, whiteSpace:"nowrap",
                            }}>{store.label.split(" ")[0]}</button>

                            {/* Étoile */}
                            <button onClick={() => toggleFrequent(cat.id, item.id)} style={{
                              background:"none", border:"none", cursor:"pointer",
                              fontSize:13, color: item.frequent ? "#c8a96e" : "#222", padding:3,
                            }}>★</button>

                            {/* Supprimer */}
                            <button onClick={() => deleteItem(cat.id, item.id)} style={{
                              background:"none", border:"none", cursor:"pointer", fontSize:11, color:"#222", padding:3,
                            }}>✕</button>
                          </div>

                          {/* Sélecteur magasin */}
                          {isEditingThis && (
                            <div style={{ display:"flex", gap:6, padding:"8px 20px 8px 50px", background:"#111", borderBottom:"1px solid #111" }}>
                              {STORES.map(s => (
                                <button key={s.id} onClick={() => setItemStore(cat.id, item.id, s.id)} style={{
                                  background: item.store === s.id ? s.color : "transparent",
                                  border: `1px solid ${item.store === s.id ? s.color : "#333"}`,
                                  color: item.store === s.id ? "#0f0f0f" : s.color,
                                  borderRadius:20, padding:"4px 10px", fontSize:11, cursor:"pointer",
                                }}>{s.label}</button>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              {/* Ajouter un article */}
              <div style={{ padding:"20px", borderTop:"1px solid #1a1a1a", marginTop:16 }}>
                <div style={{ fontSize:10, letterSpacing:2, color:"#555", textTransform:"uppercase", marginBottom:10 }}>Ajouter un article</div>
                <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                  <input
                    value={newItemName}
                    onChange={e => setNewItemName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addItem()}
                    placeholder="Nom de l'article..."
                    style={{ flex:1, background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:8, padding:"10px 12px", color:"#f0ede8", fontFamily:"Georgia,serif", fontSize:14, outline:"none" }}
                  />
                  <button onClick={addItem} style={{ background:"#c8a96e", border:"none", borderRadius:8, padding:"10px 16px", color:"#0f0f0f", cursor:"pointer", fontSize:18, fontWeight:"bold" }}>+</button>
                </div>
                <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                  {STORES.map(s => (
                    <button key={s.id} onClick={() => setNewItemStore(s.id)} style={{
                      background: newItemStore === s.id ? s.color : "transparent",
                      border: `1px solid ${newItemStore === s.id ? s.color : "#333"}`,
                      color: newItemStore === s.id ? "#0f0f0f" : s.color,
                      borderRadius:20, padding:"4px 10px", fontSize:11, cursor:"pointer", flex:1,
                    }}>{s.label}</button>
                  ))}
                </div>
                <select value={newItemCat} onChange={e => setNewItemCat(e.target.value)} style={{
                  width:"100%", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:8,
                  padding:"10px 12px", color:"#666", fontFamily:"Georgia,serif", fontSize:13, outline:"none",
                }}>
                  {categories.map(cat => <option key={cat.id} value={cat.id}>{cat.label}</option>)}
                </select>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MOUNT ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GroceryApp />);
  </script>
</body>
</html>
